---
services:
  db:
    image: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiii2026 -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  backend:
    build:
      context: backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./charts:/app/charts
  frontend:
    build:
      context: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./charts:/usr/share/nginx/html/charts
volumes:
  db_data: